<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Handover acknowledgement — ITACM</title>
  <link rel="stylesheet" href="/css/app.css" />
  <style>
    body { background: var(--surface, #f4f5f8); min-height: 100vh; display: grid; place-items: center; padding: 24px; margin: 0; font-family: system-ui, sans-serif; }
    .ack-card { width: min(480px, 100%); background: #fff; border: 1px solid #e4e1ee; border-radius: 16px; padding: 28px; box-shadow: 0 8px 30px rgba(19,27,46,.08); }
    .ack-card h1 { font-size: 1.35rem; margin: 0 0 8px; }
    .ack-card p { color: #5c6670; margin: 0 0 16px; line-height: 1.45; }
    .ack-card ul { margin: 0 0 18px; padding-left: 1.1rem; }
    .ack-card li { margin: 4px 0; }
    .ack-ok { color: #047857; font-weight: 700; }
    input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #d8d5e5; margin: 8px 0 14px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; border: 0; border-radius: 999px; background: #3525cd; color: #fff; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: .6; cursor: default; }
    .err { color: #be123c; font-size: 13px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="ack-card" id="root">Loading…</div>
  <script src="/js/ack.js"></script>
</body>
</html>
