# ITACM — self-hosted stack: API + PostgreSQL, fully automatic provisioning.
#
#   cp .env.example .env       # then edit at least JWT_SECRET & ADMIN_*
#   docker compose up -d
#   docker compose logs api    # first-run admin credentials appear here
#
# The API applies the database schema and seeds the first Admin account on
# startup — no manual SQL, users, or permissions required.
#
# Persistence (DO NOT skip these volumes):
#   db-data  → PostgreSQL (assets, users, settings, …)
#   app-data → uploaded documents under /app/data (handover scans, contracts, …)
#
# WARNING: `docker compose down -v` DELETES both volumes (DB + document files).
# Prefer `docker compose down` (no -v) or `docker compose restart` for normal stops.
#
# Tip: only run this compose from ONE working directory per host. Two clones that
# both resolve to project name "itacm" share the same volumes but may use
# different .env passwords and cause auth failures.
#
# After `git pull`, UI updates apply immediately because ./public is bind-mounted.
# If the API image itself must refresh: FRONTEND_DIGEST=$(git rev-parse HEAD) docker compose up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-itacm}
      POSTGRES_USER: ${POSTGRES_USER:-itacm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-itacm_change_me}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-itacm} -d ${POSTGRES_DB:-itacm}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Uncomment to reach the DB from the host (psql, DBeaver, ...):
    # ports:
    #   - "5432:5432"

  api:
    build:
      context: .
      args:
        # Pass a changing digest so `docker compose build` always copies fresh public/.
        # Example: FRONTEND_DIGEST=$(git rev-parse HEAD) docker compose up -d --build
        FRONTEND_DIGEST: ${FRONTEND_DIGEST:-${GIT_COMMIT:-unknown}}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Named volume REQUIRED — without this, uploads die when the container is recreated.
    # Bind-mount public/ so a fresh git checkout always serves current UI (avoids
    # stale BuildKit COPY layers that Docker Desktop sometimes reuses across clones).
    volumes:
      - type: volume
        source: app-data
        target: /app/data
      - type: bind
        source: ./public
        target: /app/public
        read_only: true
    environment:
      DATA_BACKEND: postgres
      DATA_DIR: /app/data
      DATABASE_URL: postgres://${POSTGRES_USER:-itacm}:${POSTGRES_PASSWORD:-itacm_change_me}@db:5432/${POSTGRES_DB:-itacm}
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env (generate with openssl rand -hex 32)}"
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      JWT_REMEMBER_EXPIRES_IN: ${JWT_REMEMBER_EXPIRES_IN:-30d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-IT Admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      PORT: 8000
      # Set TRUST_PROXY=1 only behind a reverse proxy that sanitizes X-Forwarded-For.
      TRUST_PROXY: ${TRUST_PROXY:-0}
      ONBOARDING_VIDEO_URL: ${ONBOARDING_VIDEO_URL:-}
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      # /api/health returns 503 when the DB is unreachable; wget exits non-zero
      # on that, so the container is flagged unhealthy. (wget ships in alpine.)
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db-data:
    name: itacm_db-data
  app-data:
    name: itacm_app-data
